steps:
  # ============================================
  # PASO 1: Build Python AI Microservice image
  # ============================================
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-ai'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/gestion-del-fin-ai:$COMMIT_SHA'
      - './ai-microservice'

  # PASO 2: Push Python AI image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-ai'
    waitFor: ['build-ai']
    args: ['push', 'gcr.io/$PROJECT_ID/gestion-del-fin-ai:$COMMIT_SHA']

  # PASO 3: Deploy Python AI to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-ai'
    waitFor: ['push-ai']
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'gestion-del-fin-ai'
      - '--image'
      - 'gcr.io/$PROJECT_ID/gestion-del-fin-ai:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '2'

  # PASO 3.1: Verificar que IA esté activa y saludable antes de desplegar API
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'check-ai-health'
    waitFor: ['deploy-ai']
    entrypoint: bash
    args:
      - '-c'
      - |
        AI_URL=$$(gcloud run services describe gestion-del-fin-ai \
          --region=us-central1 \
          --platform=managed \
          --format='value(status.url)')

        echo "Checking AI health at: $${AI_URL}/health"
        for i in {1..30}; do
          if curl -fsS "$${AI_URL}/health" >/dev/null; then
            echo "AI microservice is healthy."
            exit 0
          fi
          echo "Attempt $$i/30: AI not ready yet, retrying in 5s..."
          sleep 5
        done

        echo "ERROR: AI microservice did not become healthy in time."
        exit 1

  # ============================================
  # PASO 4: Build NestJS API image
  # ============================================
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-api'
    waitFor: ['push-ai']
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/gestion-del-fin-api:$COMMIT_SHA', '.']

  # PASO 5: Push NestJS API image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-api'
    waitFor: ['build-api']
    args: ['push', 'gcr.io/$PROJECT_ID/gestion-del-fin-api:$COMMIT_SHA']

  # PASO 6: Deploy NestJS API with AI_SERVICE_URL pointing to the Python service
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-api'
    waitFor: ['check-ai-health', 'push-api']
    entrypoint: bash
    env:
      - '_DB_HOST=$_DB_HOST'
      - '_DB_PORT=$_DB_PORT'
      - '_DB_USER=$_DB_USER'
      - '_DB_PASS=$_DB_PASS'
      - '_DB_NAME=$_DB_NAME'
      - '_JWT_SECRET=$_JWT_SECRET'
      - '_CORS_ORIGIN=$_CORS_ORIGIN'
      - '_CLOUDINARY_CLOUD_NAME=$_CLOUDINARY_CLOUD_NAME'
      - '_CLOUDINARY_API_KEY=$_CLOUDINARY_API_KEY'
      - '_CLOUDINARY_API_SECRET=$_CLOUDINARY_API_SECRET'
    args:
      - '-c'
      - |
        AI_URL=$$(gcloud run services describe gestion-del-fin-ai \
          --region=us-central1 \
          --platform=managed \
          --format='value(status.url)')

        REQUIRED_VARS="_DB_HOST _DB_PORT _DB_USER _DB_PASS _DB_NAME _JWT_SECRET _CORS_ORIGIN _CLOUDINARY_CLOUD_NAME _CLOUDINARY_API_KEY _CLOUDINARY_API_SECRET"
        for VAR_NAME in $$REQUIRED_VARS; do
          if [ -z "$${!VAR_NAME}" ]; then
            echo "ERROR: Required Cloud Build substitution '$$VAR_NAME' is empty. Configure it in the trigger substitutions."
            exit 1
          fi
        done

        gcloud run deploy gestion-del-fin-api \
          --image=gcr.io/$PROJECT_ID/gestion-del-fin-api:$COMMIT_SHA \
          --region=us-central1 \
          --platform=managed \
          --update-env-vars=AI_SERVICE_URL=$${AI_URL}

images:
  - 'gcr.io/$PROJECT_ID/gestion-del-fin-ai:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/gestion-del-fin-api:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1800s'
